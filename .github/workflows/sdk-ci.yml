name: SDK CI

on:
  push:
    branches: [main]
    paths: [packages/sdk/**, .github/workflows/sdk-ci.yml]
  pull_request:
    branches: [main]
    paths: [packages/sdk/**, .github/workflows/sdk-ci.yml]

defaults:
  run:
    working-directory: packages/sdk

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci
      - run: npm run test
      - run: npm run build

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: packages/sdk/package-lock.json

      - run: npm ci

      - name: npm audit
        run: npm audit --audit-level=high

      - name: Lockfile integrity check
        run: |
          npm ci --ignore-scripts
          git diff --exit-code package-lock.json
